<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Dashboard overview placeholder">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <style>
      .bg{fill:url(#g)}
      .card{fill:white;stroke:#E2E8F0;stroke-width:1;rx:8;}
      .title{fill:#0F172A;font-family:Inter,system-ui,Arial;font-size:20px;font-weight:600}
      .label{fill:#64748B;font-family:Inter,system-ui,Arial;font-size:14px}
    </style>
  </defs>
  <rect class="bg" width="1200" height="700" rx="0"/>
  <text x="32" y="44" class="title">Dashboard — Overview (placeholder)</text>
  <!-- Top cards -->
  <g transform="translate(32,80)">
    <rect class="card" width="256" height="112" rx="10"/>
    <rect class="card" x="276" width="256" height="112" rx="10"/>
    <rect class="card" x="520" width="256" height="112" rx="10"/>
    <rect class="card" x="764" width="256" height="112" rx="10"/>
    <text x="16" y="36" class="label">KPI 1</text>
    <text x="292" y="36" class="label">KPI 2</text>
    <text x="536" y="36" class="label">KPI 3</text>
    <text x="780" y="36" class="label">KPI 4</text>
  </g>
  <!-- Chart area -->
  <g transform="translate(32,212)">
    <rect class="card" width="988" height="300" rx="10"/>
    <text x="16" y="28" class="label">Traffic chart</text>
  </g>
  <!-- Sidebar hint -->
  <g transform="translate(1040,80)">
    <rect width="120" height="520" rx="8" fill="#030213"/>
    <text x="16" y="36" fill="#fff" font-family="Inter,system-ui" font-size="14">Sidebar</text>
  </g>
</svg>
