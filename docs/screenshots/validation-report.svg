<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Validation report placeholder">
  <style>
    .bg{fill:#F8FAFC}
    .card{fill:white;stroke:#E2E8F0}
    .title{fill:#0F172A;font-family:Inter,system-ui,Arial;font-size:20px;font-weight:700}
    .text{fill:#64748B;font-family:Inter,system-ui,Arial;font-size:13px}
    .error{fill:#E11D48}
  </style>
  <rect class="bg" width="1200" height="700"/>
  <text x="32" y="44" class="title">Validation Report (placeholder)</text>
  <g transform="translate(32,80)">
    <rect class="card" width="540" height="220" rx="8"/>
    <text x="16" y="36" class="text">Summary</text>
    <rect x="0" y="120" width="520" height="80" fill="#FFF7F9" rx="6"/>
    <text x="16" y="156" class="text">Errors: <tspan class="error">12</tspan></text>
  </g>
  <g transform="translate(600,80)">
    <rect class="card" width="540" height="420" rx="8"/>
    <text x="16" y="36" class="text">Details</text>
    <text x="16" y="64" class="text">- Row 2: missing field "customer_id"</text>
    <text x="16" y="84" class="text">- Row 5: invalid date format</text>
  </g>
</svg>
